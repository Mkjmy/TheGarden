<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARDEN - Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-form { max-width: 400px; margin: 4rem auto; border: 1px solid var(--border); padding: 2.5rem; border-radius: 4px; }
        .auth-form h2 { text-align: center; margin-bottom: 2rem; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase; color: var(--muted); }
        .form-control { width: 100%; padding: 0.8rem; border: 1px solid var(--border); background: var(--bg); color: var(--fg); box-sizing: border-box; }
        .btn-auth { width: 100%; background: var(--acc); color: var(--bg); padding: 0.8rem; border: none; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--muted); }
    </style>
</head>
<body>
    <header>
        <h1>GARDEN / LOGIN</h1>
        <nav><a href="/garden">BACK</a></nav>
    </header>

    <main class="auth-form">
        <h2>Enter Garden</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-auth">LOG IN</button>
        </form>
        <div class="auth-footer">
            <p><a href="/recover">Forgot password?</a></p>
            <p style="margin-bottom: 1rem; line-height: 1.4;">
                Identities are used to secure your presence in The Garden. 
                If you choose to remain fully anonymous, remember that your alias has no protection from impersonation.
            </p>
            Need an identity? <a href="/register">Create one</a>
        </div>
    </main>
</body>
</html>
